title: Hello, world! I'm Lucas Germano
description: > # this means to ignore newlines until "baseurl:"
  Welcome to my blog.
permalink: ':title/'
baseurl: "/" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
site-twitter: #if your site has a twitter account, enter it here

# Author Settings
author: Lucas Germano # add your name
author-img: IMG_20161228_225050.jpg # add your photo
about-author: I'm a software engineer. # add description
social-twitter: luke_germano # add your Twitter handle
social-facebook: lucas.germano.376 # add your Facebook handle
social-github: lucassan # add your Github handle
social-linkedin: lukegermano # add your Linkedin handle
social-email: lucas.germano@gmail.com # add your Email address

# Tracker
analytics: # Google Analytics

# Build Settings
markdown: kramdown
remote_theme: artemsheludko/flexible-jekyll
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

paginate: 8
paginate_path: "/page/:num"

exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock"]
